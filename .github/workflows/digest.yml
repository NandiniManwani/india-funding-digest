name: India Funding Digest

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch: {}

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: python digest.py

      - name: Commit updated seen.json
        run: |
          git config --global user.name "digest-bot"
          git config --global user.email "digest-bot@users.noreply.github.com"
          git add seen.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update seen articles"
          git push
